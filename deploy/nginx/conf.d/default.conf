# 默认反向代理到后端 + WebSocket
upstream jiujiu_api {
  server server:3000;
}

server {
  listen 80;
  server_name _;

  # 后端 API
  location /api/ {
    proxy_pass http://jiujiu_api/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Swagger 文档
  location /api/docs {
    proxy_pass http://jiujiu_api/api/docs;
    proxy_set_header Host $host;
  }

  # 在线客服 WebSocket
  location /ws/ {
    proxy_pass http://jiujiu_api/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400s;
  }

  # 健康检查
  location /health {
    proxy_pass http://jiujiu_api/api/v1/health;
  }

  # 默认页（后期可挂载 PC 端构建产物）
  location / {
    return 200 '{"service":"jiujiu-mall","status":"ok"}';
    add_header Content-Type application/json;
  }
}
