# 仅依赖服务（开发时使用，前端 / 后端在宿主机本地跑）
services:
  postgres:
    image: postgres:16-alpine
    container_name: jiujiu-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: jiujiu
      POSTGRES_PASSWORD: jiujiu_dev_pwd
      POSTGRES_DB: jiujiu_mall
      TZ: Asia/Shanghai
    ports:
      - '5433:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jiujiu-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data

  minio:
    image: minio/minio:latest
    container_name: jiujiu-minio-dev
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data_dev:/data

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:
