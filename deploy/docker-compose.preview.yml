# 经纬科技商城 5.0 · 服务器预览部署
# 与 o2o-preview / 主机服务隔离：全部绑 127.0.0.1 + 端口偏移
#   postgres : 127.0.0.1:5433
#   redis    : 127.0.0.1:6398
#   minio    : 127.0.0.1:9200 (api) / 9201 (console)
services:
  postgres:
    image: postgres:16-alpine
    container_name: shangcheng-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shangcheng
      POSTGRES_PASSWORD: shangcheng_dev_pwd
      POSTGRES_DB: shangcheng_mall
      TZ: Asia/Shanghai
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shangcheng']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shangcheng-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6398:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: shangcheng-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - '127.0.0.1:9200:9000'
      - '127.0.0.1:9201:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: shangcheng-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin_dev; do sleep 2; done;
      /usr/bin/mc mb -p local/shangcheng-mall || true;
      /usr/bin/mc anonymous set public local/shangcheng-mall || true;
      echo 'MinIO bucket ready';
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
