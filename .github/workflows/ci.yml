# ----------------------------------------------------------------------------
# CI: 静态检查 + 类型检查 + 单元测试 + 集成测试（PR 与 main 分支必跑）
#
# 设计原则：
#   - 全部硬门禁：lint / typecheck / test 任一失败 → 红灯阻断
#     （server/test/ 已是真实用例，详见 Unit tests 步骤注释）。
#   - 单 Node 版本（20.x）：仓库 engines.node 已锁 >=20.19.0；引入 matrix
#     会让 pnpm 缓存命中率下降、且暂无多版本验证需求。
#   - pnpm 通过 packageManager 字段（package.json）自动启用 corepack。
# ----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 PR 连续 push 时取消旧任务，节省 Actions 配额
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint / typecheck / test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20']
    # 集成测试依赖的服务容器：随 job 启动、随 job 销毁（每次 run 全新实例）。
    # 因此对该库执行 prisma db push 是安全的——它只是一次性测试库，没有任何
    # 持久数据，无需 migrate 历史。健康检查确保服务就绪后才开始跑 steps。
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        # corepack enable 会读 package.json#packageManager，自动装对的 pnpm 版本
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile 强制 pnpm-lock.yaml 与 package.json 完全一致
        # 偶发"lockfile 不一致"通常意味着 PR 漏提交 lockfile，要红灯阻断
        run: pnpm install --frozen-lockfile

      - name: Build @jiujiu/shared (上游依赖，必须最先编译)
        # admin-pc / server / 各端都通过 workspace:* 引用 @jiujiu/shared，
        # 后续 typecheck/lint 需要它的 dist + 类型产物
        run: pnpm --filter @jiujiu/shared build

      - name: Generate Prisma client
        # typecheck / jest 都引用 @prisma/client 的生成类型。pnpm install 的
        # postinstall 通常会自动 generate，但显式跑一次成本极低且消除不确定性
        # （与 build.yml 的 Build server 前置步骤保持一致）。
        run: pnpm --filter @jiujiu/server exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        # 防 vue-tsc 插件路径失效导致 typecheck 静默降级为「假绿灯」：
        # 一旦输出里出现 "Load plugin failed"，即便退出码为 0 也判失败。
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log
          if grep -q "Load plugin failed" typecheck.log; then
            echo "::error::vue-tsc 插件加载失败——typecheck 可能已降级为假绿灯，请修复 tsconfig"
            exit 1
          fi

      - name: Unit tests (server)
        # 硬门禁：server/test/ 已补齐 13 套真实用例（234 个），覆盖资金安全核心
        # （微信回调幂等/验签/refresh rotation/价格分级计价/优惠券重算/会员闸门/
        # WS 鉴权）。测试失败必须红灯阻断，不再 || true 软放过。
        run: pnpm test:server

      - name: Push schema to test DB
        # db push（非 migrate）直接按 schema.prisma 建表：服务容器里的库是
        # 每次 run 的一次性实例，无历史数据，push 安全且最快。硬门禁。
        run: pnpm --filter @jiujiu/server db:push:test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public

      - name: Integration tests (server)
        # 硬门禁：跑 jest.integration.config.js（--runInBand），连真实
        # Postgres + Redis 服务容器验证仓储/事务/缓存行为。
        run: pnpm --filter @jiujiu/server test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
          REDIS_URL: redis://localhost:6379
